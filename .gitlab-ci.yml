stages:
  - test
  - check
  - deploy

test:
  stage: test
  tags:
    - maas-check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  script:
    - go mod download
    - go test ./... -coverprofile=coverage.out
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+\d+\.\d+%/'
  artifacts:
    when: always
    paths:
      - coverage.out

check:
  stage: check
  tags:
    - maas-check
  needs:
    - test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  script:
    - go mod download
    - go build -o maas-ldap .

deploy:
  stage: deploy
  tags:
    - maas-deploy
  resource_group: maas-ldap-production
  needs:
    - check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - test -r "$ENV_FILE"
    - go mod download
    - go build -o maas-ldap .
    - sudo /usr/bin/install -d -o maas -g deploy -m 2770 /opt/maas-ldap
    - install -m 0750 maas-ldap /opt/maas-ldap/maas-ldap
    - install -m 0640 "$ENV_FILE" /opt/maas-ldap/.env
    - install -m 0644 maas-ldap.service /opt/maas-ldap/maas-ldap.service
    - sudo /usr/bin/chown maas:deploy /opt/maas-ldap /opt/maas-ldap/maas-ldap /opt/maas-ldap/.env /opt/maas-ldap/maas-ldap.service
    - sudo /usr/bin/chmod 2770 /opt/maas-ldap
    - sudo /usr/bin/chmod 0750 /opt/maas-ldap/maas-ldap
    - sudo /usr/bin/chmod 0640 /opt/maas-ldap/.env
    - sudo /usr/bin/chmod 0644 /opt/maas-ldap/maas-ldap.service
    - sudo /usr/bin/install -m 0644 /opt/maas-ldap/maas-ldap.service /etc/systemd/system/maas-ldap.service
    - sudo /usr/bin/systemctl daemon-reload
    - sudo /usr/bin/systemctl enable maas-ldap.service
    - sudo /usr/bin/systemctl restart maas-ldap.service
    - sudo /usr/bin/systemctl status maas-ldap.service --no-pager
